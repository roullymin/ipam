<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1380" viewBox="0 0 1800 1380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FA"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0F2740"/>
      <stop offset="1" stop-color="#12395B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F2740" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 30px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
      .subtitle { font: 500 15px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .section-title { font: 700 18px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
      .shell-title { font: 700 18px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #FFFFFF; }
      .label { font: 700 14px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0F172A; }
      .small { font: 500 12px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #64748B; }
      .shell-small { font: 500 12px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #D7E9F8; }
      .chip { font: 700 11px 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0369A1; }
    </style>
  </defs>

  <rect width="1800" height="1380" fill="url(#bg)"/>

  <text x="60" y="68" class="title">AtlasOps v1 Component Architecture</text>
  <text x="60" y="98" class="subtitle">图片版组件结构图：主壳层、模块层、推荐拆分层级</text>

  <rect x="60" y="130" width="1680" height="170" rx="30" fill="url(#shell)" filter="url(#shadow)"/>
  <text x="92" y="170" class="shell-title">Main Shell / 主壳层</text>
  <text x="92" y="196" class="shell-small">App.jsx 负责入口模式、鉴权会话、全局状态、路由分发、全局弹层和跨模块跳转。</text>

  <rect x="92" y="220" width="220" height="52" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="112" y="252" class="shell-title">AppHeader</text>
  <rect x="330" y="220" width="220" height="52" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="350" y="252" class="shell-title">AppSidebar</text>
  <rect x="568" y="220" width="220" height="52" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="588" y="252" class="shell-title">AppScreenRouter</text>
  <rect x="806" y="220" width="220" height="52" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="826" y="252" class="shell-title">GlobalSearchModal</text>
  <rect x="1044" y="220" width="220" height="52" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="1064" y="252" class="shell-title">AlertCenterModal</text>
  <rect x="1282" y="220" width="220" height="52" rx="18" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="1302" y="252" class="shell-title">SystemStatusModal</text>

  <g filter="url(#shadow)">
    <rect x="60" y="340" width="510" height="280" rx="30" fill="#FFFFFF" stroke="#D8E4EF"/>
    <text x="88" y="380" class="section-title">Dashboard Module / 总览态势</text>
    <text x="88" y="404" class="small">回答“今天先处理什么”，偏行动入口和全局态势。</text>
    <rect x="88" y="430" width="146" height="52" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/><text x="110" y="462" class="label">DashboardHero</text>
    <rect x="248" y="430" width="146" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="267" y="462" class="label">QuickActions</text>
    <rect x="408" y="430" width="134" height="52" rx="18" fill="#FEF3C7" stroke="#FCD34D"/><text x="427" y="462" class="label">PriorityCards</text>
    <rect x="88" y="500" width="146" height="52" rx="18" fill="#F0FDF4" stroke="#BBF7D0"/><text x="101" y="532" class="label">DatacenterHeat</text>
    <rect x="248" y="500" width="146" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="270" y="532" class="label">RecentActivity</text>
    <rect x="408" y="500" width="134" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="440" y="532" class="label">AdvicePanel</text>
    <rect x="88" y="570" width="220" height="28" rx="14" fill="#E0F2FE"/><text x="104" y="589" class="chip">VersionStatusPanel</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="340" width="560" height="280" rx="30" fill="#FFFFFF" stroke="#D8E4EF"/>
    <text x="618" y="380" class="section-title">IPAM Module / 网络地址</text>
    <text x="618" y="404" class="small">回答“有哪些地址、哪些风险、能否直接定位到子网和条目”。</text>
    <rect x="618" y="430" width="170" height="52" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/><text x="646" y="462" class="label">SectionTreeSidebar</text>
    <rect x="804" y="430" width="154" height="52" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/><text x="821" y="462" class="label">SubnetHeader</text>
    <rect x="974" y="430" width="148" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="992" y="462" class="label">MetricTiles</text>
    <rect x="618" y="500" width="170" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="641" y="532" class="label">ActionToolbar</text>
    <rect x="804" y="500" width="154" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="832" y="532" class="label">IpPoolGridView</text>
    <rect x="974" y="500" width="148" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1008" y="532" class="label">IpListTable</text>
    <rect x="618" y="570" width="220" height="28" rx="14" fill="#E2E8F0"/><text x="635" y="589" class="chip">SectionCard / SubnetInfo / StatusBadge</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1170" y="340" width="570" height="280" rx="30" fill="#FFFFFF" stroke="#D8E4EF"/>
    <text x="1198" y="380" class="section-title">DCIM Module / 机房设备</text>
    <text x="1198" y="404" class="small">回答“机房、机柜、设备、功率与立面状态是否一眼可见”。</text>
    <rect x="1198" y="430" width="160" height="52" rx="18" fill="#EFF6FF" stroke="#BFDBFE"/><text x="1225" y="462" class="label">DatacenterSidebar</text>
    <rect x="1374" y="430" width="140" height="52" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/><text x="1409" y="462" class="label">DcimHeader</text>
    <rect x="1530" y="430" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1561" y="462" class="label">DcimMetricTiles</text>
    <rect x="1198" y="500" width="160" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1242" y="532" class="label">RackGrid</text>
    <rect x="1374" y="500" width="140" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1412" y="532" class="label">RackCard</text>
    <rect x="1530" y="500" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1554" y="532" class="label">ElevationWorkspace</text>
    <rect x="1198" y="570" width="220" height="28" rx="14" fill="#E2E8F0"/><text x="1214" y="589" class="chip">RackSidebarDrawer / RackDeviceRow</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="650" width="540" height="300" rx="30" fill="#FFFFFF" stroke="#D8E4EF"/>
    <text x="88" y="690" class="section-title">Change Requests / 设备变更申请</text>
    <text x="88" y="714" class="small">回答“申请、审批、执行、外链补单是否在同一条流程里闭环”。</text>
    <rect x="88" y="740" width="170" height="52" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/><text x="104" y="772" class="label">ChangeRequestToolbar</text>
    <rect x="274" y="740" width="128" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="307" y="772" class="label">ChangeStats</text>
    <rect x="418" y="740" width="154" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="441" y="772" class="label">ChangeRequestTable</text>
    <rect x="88" y="810" width="170" height="52" rx="18" fill="#FFF7ED" stroke="#FDBA74"/><text x="107" y="842" class="label">PublicLinkActions</text>
    <rect x="274" y="810" width="128" height="52" rx="18" fill="#F0FDF4" stroke="#BBF7D0"/><text x="302" y="842" class="label">DraftFormModal</text>
    <rect x="418" y="810" width="154" height="52" rx="18" fill="#FEF2F2" stroke="#FECACA"/><text x="451" y="842" class="label">ExecutionModal</text>
    <rect x="88" y="880" width="250" height="28" rx="14" fill="#E2E8F0"/><text x="103" y="899" class="chip">ChangeItemEditor / ExecutionItemEditor</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="650" width="550" height="300" rx="30" fill="#FFFFFF" stroke="#D8E4EF"/>
    <text x="648" y="690" class="section-title">Resident Module / 驻场运营</text>
    <text x="648" y="714" class="small">回答“驻场登记、审批、工位、设备备案和导入导出是否顺畅”。</text>
    <rect x="648" y="740" width="150" height="52" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/><text x="685" y="772" class="label">ResidentToolbar</text>
    <rect x="814" y="740" width="120" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="844" y="772" class="label">ResidentStats</text>
    <rect x="950" y="740" width="192" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="981" y="772" class="label">ResidentListTable</text>
    <rect x="648" y="810" width="150" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="668" y="842" class="label">ExpandedDetail</text>
    <rect x="814" y="810" width="120" height="52" rx="18" fill="#F0FDF4" stroke="#BBF7D0"/><text x="843" y="842" class="label">EditModal</text>
    <rect x="950" y="810" width="192" height="52" rx="18" fill="#FFF7ED" stroke="#FDBA74"/><text x="992" y="842" class="label">ImportFlow</text>
    <rect x="648" y="880" width="170" height="28" rx="14" fill="#E2E8F0"/><text x="667" y="899" class="chip">ResidentDeviceCard</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1190" y="650" width="550" height="300" rx="30" fill="#FFFFFF" stroke="#D8E4EF"/>
    <text x="1218" y="690" class="section-title">Security + Users / 安全与平台管理</text>
    <text x="1218" y="714" class="small">安全页偏风险轨迹，用户页偏账号、角色和策略矩阵。</text>
    <rect x="1218" y="740" width="146" height="52" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/><text x="1247" y="772" class="label">SecurityToolbar</text>
    <rect x="1380" y="740" width="146" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1415" y="772" class="label">SecurityStats</text>
    <rect x="1542" y="740" width="170" height="52" rx="18" fill="#FEF2F2" stroke="#FECACA"/><text x="1584" y="772" class="label">LoginAuditPanel</text>
    <rect x="1218" y="810" width="146" height="52" rx="18" fill="#FFF7ED" stroke="#FDBA74"/><text x="1254" y="842" class="label">BlocklistPanel</text>
    <rect x="1380" y="810" width="146" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1400" y="842" class="label">AuditTimeline</text>
    <rect x="1542" y="810" width="170" height="52" rx="18" fill="#ECFEFF" stroke="#A5F3FC"/><text x="1580" y="842" class="label">UserToolbar</text>
    <rect x="1218" y="880" width="146" height="28" rx="14" fill="#E2E8F0"/><text x="1251" y="899" class="chip">UserStats</text>
    <rect x="1380" y="880" width="146" height="28" rx="14" fill="#E2E8F0"/><text x="1401" y="899" class="chip">RoleMatrix / UserTable</text>
    <rect x="1542" y="880" width="170" height="28" rx="14" fill="#E2E8F0"/><text x="1570" y="899" class="chip">PolicyNotesPanel</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="980" width="1680" height="290" rx="30" fill="#FFFFFF" stroke="#D8E4EF"/>
    <text x="88" y="1020" class="section-title">Supporting Layer / 共享支撑层</text>
    <text x="88" y="1044" class="small">这些组件不属于单一业务页面，但决定了整个 v1 的一致性和可维护性。</text>

    <rect x="88" y="1072" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="123" y="1104" class="label">ListToolbar</text>
    <rect x="284" y="1072" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="329" y="1104" class="label">StatusBadge</text>
    <rect x="480" y="1072" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="542" y="1104" class="label">Modal</text>
    <rect x="676" y="1072" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="717" y="1104" class="label">RackElevation</text>
    <rect x="872" y="1072" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="905" y="1104" class="label">ImportWizard</text>
    <rect x="1068" y="1072" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1102" y="1104" class="label">AuthModals</text>
    <rect x="1264" y="1072" width="180" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1287" y="1104" class="label">NetworkModals</text>
    <rect x="1460" y="1072" width="200" height="52" rx="18" fill="#F8FAFC" stroke="#D8E4EF"/><text x="1485" y="1104" class="label">DcimManagementModals</text>

    <text x="88" y="1170" class="label">Recommended v1.x refactor order</text>
    <text x="88" y="1196" class="small">1. Dashboard / Users / Security → 2. IPAM / Resident → 3. DCIM → 4. Change Requests</text>
    <text x="88" y="1232" class="small">原则：先拆业务耦合低的页面，最后再拆状态最重、流程最复杂的页面。</text>
  </g>
</svg>
