version: '3.8'

services:
  # --- 1. 核心数据库 (MySQL 8.0) ---
  db:
    image: mysql:8.0
    container_name: ipam_db
    restart: always
    ports:                          # ← 添加这一行（关键！）
      - "3306:3306"
    env_file: .env
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./config/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - ipam_net
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # --- 2. 后端应用 (Django + Gunicorn) ---
  backend:
    build: ./backend
    container_name: ipam_backend
    restart: always
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    env_file: .env
    volumes:
      - ./backend:/app
      - ./data/static:/app/static
      - ./data/media:/app/media
      - ./data/backups:/app/backups # <--- 关键新增：让 Django 也能读写备份目录
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ipam_net
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "3"

  # --- 3. 反向代理网关 (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: ipam_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./data/static:/app/static
      - ./data/media:/app/media
      - ./certs:/etc/nginx/certs
    depends_on:
      - backend
    networks:
      - ipam_net
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "3"

  # --- 4. 自动备份服务 (Auto Backup) ---
  backup:
    image: mysql:8.0
    container_name: ipam_backup_worker
    depends_on:
      - db
    env_file: .env
    volumes:
      - ./data/backups:/backups
    entrypoint: |
      bash -c '
      echo "Backup service started...";
      while true; do
        current_hour=$$(date +%H)
        if [ "$$current_hour" == "03" ]; then
          echo "Starting daily backup...";
          mysqldump -h db -u $$MYSQL_USER -p"$$MYSQL_PASSWORD" --all-databases | gzip > /backups/db_backup_$$(date +%Y%m%d_%H%M).sql.gz;
          echo "Backup created. Cleaning up old files...";
          find /backups -type f -mtime +30 -name "*.gz" -delete;
          sleep 3600; 
        fi
        sleep 1800;
      done
      '
    networks:
      - ipam_net

networks:
  ipam_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.200.0.0/24
